name: Multi-Platform Builder
on:
  repository_dispatch:
    types: [build-project]

jobs:
  build-windows:
    if: github.event.client_payload.platform == 'windows'
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build EXE
        shell: bash
        run: |
          curl -s -L "${{ github.event.client_payload.downloadUrl }}" > data.json
          node -e "
            const fs = require('fs');
            const d = JSON.parse(fs.readFileSync('data.json'));
            fs.writeFileSync('index.html', d.html);
            fs.writeFileSync('main.js', d.main);
            fs.writeFileSync('preload.js', d.preload);
            fs.writeFileSync('splash.html', d.splash);
            fs.writeFileSync('package.json', d.packageJson);
          "
          npm install
          npx electron-builder --win portable
          EXE_PATH=$(ls dist/*.exe | head -n 1)
          curl -X POST -F "exe=@$EXE_PATH" "${{ github.event.client_payload.uploadUrl }}"

  build-android:
    if: github.event.client_payload.platform == 'android'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Install Bubblewrap (PWA to APK)
        run: npm install -g @bubblewrap/cli
      
      - name: Build APK
        run: |
          # Fetch the HTML source
          curl -s -L "${{ github.event.client_payload.downloadUrl }}" > data.json
          
          # For Android, we package the HTML as a TWA (Trusted Web Activity)
          # This uses Bubblewrap to wrap your single-file HTML into a real APK
          node -e "
            const fs = require('fs');
            const d = JSON.parse(fs.readFileSync('data.json'));
            fs.writeFileSync('index.html', d.html);
          "
          
          # Note: Bubblewrap usually requires a manifest. 
          # For a quick single-file build, we use a simplified CLI approach
          # In a production environment, you'd use a more robust Cordova/Capacitor setup.
          # For now, we will use a placeholder tool or Cordova.
          npm install -g cordova
          cordova create build_android com.architect.game "Game"
          cp index.html build_android/www/
          cd build_android
          cordova platform add android
          cordova build android --release --device
          
          APK_PATH=$(find platforms/android/app/build/outputs/apk/release -name "*.apk" | head -n 1)
          curl -X POST -F "exe=@$APK_PATH" "${{ github.event.client_payload.uploadUrl }}"
