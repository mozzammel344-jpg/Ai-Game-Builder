name: Multi-Platform Builder
on:
  repository_dispatch:
    types: [build-project]

jobs:
  build-windows:
    if: github.event.client_payload.platform == 'windows'
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Build Windows EXE
        shell: bash
        run: |
          curl -s -L "${{ github.event.client_payload.downloadUrl }}" > data.json
          node -e "
            const fs = require('fs');
            const d = JSON.parse(fs.readFileSync('data.json'));
            fs.writeFileSync('index.html', d.html);
            fs.writeFileSync('main.js', d.main);
            fs.writeFileSync('preload.js', d.preload);
            fs.writeFileSync('splash.html', d.splash);
            fs.writeFileSync('package.json', d.packageJson);
          "
          npm install
          npx electron-builder --win portable
          EXE_PATH=$(ls dist/*.exe | head -n 1)
          curl -X POST -F "exe=@$EXE_PATH" "${{ github.event.client_payload.uploadUrl }}"

  build-android:
    if: github.event.client_payload.platform == 'android'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Android APK
        run: |
          # 1. Setup Source Code
          curl -s -L "${{ github.event.client_payload.downloadUrl }}" > data.json
          node -e "
            const fs = require('fs');
            const d = JSON.parse(fs.readFileSync('data.json'));
            fs.writeFileSync('index.html', d.html);
          "
          
          # 2. Install Cordova
          npm install -g cordova
          
          # 3. Create Android Project
          # We use the safeFileName sent from your server for the app name
          cordova create build_android com.architect.game "${{ github.event.client_payload.safeFileName }}"
          cp index.html build_android/www/
          cd build_android
          
          # 4. Prepare and Build
          cordova platform add android
          
          # FORCE APK OUTPUT (Prevents the .aab error)
          cordova build android --release -- --packageType=apk
          
          # 5. Locate the APK and Send back to Render
          # We search recursively for any .apk in the build output folder
          APK_PATH=$(find platforms/android/app/build/outputs/apk/release/ -name "*.apk" | head -n 1)
          
          if [ -z "$APK_PATH" ]; then
            echo "ERROR: APK file was not generated!"
            exit 1
          fi
          
          echo "Found APK at: $APK_PATH"
          curl -X POST -F "exe=@$APK_PATH" "${{ github.event.client_payload.uploadUrl }}"
