name: Multi-Platform Builder
on:
  repository_dispatch:
    types: [build-project]

jobs:
  build-windows:
    if: github.event.client_payload.platform == 'windows'
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Build Windows EXE
        shell: bash
        run: |
          curl -s -L "${{ github.event.client_payload.downloadUrl }}" > data.json
          node -e "
            const fs = require('fs');
            const d = JSON.parse(fs.readFileSync('data.json'));
            fs.writeFileSync('index.html', d.html);
            fs.writeFileSync('main.js', d.main);
            fs.writeFileSync('preload.js', d.preload);
            fs.writeFileSync('splash.html', d.splash);
            
            let pkg = JSON.parse(d.packageJson);
            if (d.iconBase64) {
              const iconBuf = Buffer.from(d.iconBase64, 'base64');
              fs.writeFileSync('icon' + d.iconExt, iconBuf);
              pkg.build.win.icon = 'icon' + d.iconExt;
            }
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "
          npm install
          npx electron-builder --win portable
          EXE_PATH=$(ls dist/*.exe | head -n 1)
          curl -X POST -F "exe=@$EXE_PATH" "${{ github.event.client_payload.uploadUrl }}"

  build-android:
    if: github.event.client_payload.platform == 'android'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Android APK
        run: |
          # 1. Setup Source and Icon
          curl -s -L "${{ github.event.client_payload.downloadUrl }}" > data.json
          node -e "
            const fs = require('fs');
            const d = JSON.parse(fs.readFileSync('data.json'));
            fs.writeFileSync('index.html', d.html);
            if (d.iconBase64) {
              fs.writeFileSync('app_icon' + d.iconExt, Buffer.from(d.iconBase64, 'base64'));
            }
          "
          
          # 2. Install Cordova
          npm install -g cordova
          
          # 3. Create Project
          cordova create build_android com.architect.game "${{ github.event.client_payload.safeFileName }}"
          cp index.html build_android/www/
          
          # 4. Inject Icon and Preferences into config.xml
          if [ -f "app_icon.png" ] || [ -f "app_icon.jpg" ] || [ -f "app_icon.jpeg" ]; then
            # Rename whatever icon we got to a standard name
            cp app_icon* build_android/www/icon.png
            # Inject the icon tag and a preference for better compatibility
            sed -i '/<\/widget>/i \    <platform name="android"><icon src="www/icon.png" \/><\/platform>' build_android/config.xml
            sed -i '/<\/widget>/i \    <preference name="Orientation" value="landscape" \/>' build_android/config.xml
          fi
          
          cd build_android
          cordova platform add android
          
          # 5. Build DEBUG APK (This auto-signs for easy installation)
          cordova build android --debug -- --packageType=apk
          
          # 6. Locate the DEBUG apk and upload
          APK_PATH=$(find platforms/android/app/build/outputs/apk/debug/ -name "*.apk" | head -n 1)
          
          if [ -z "$APK_PATH" ]; then
            echo "ERROR: APK not found!"
            exit 1
          fi
          
          echo "Uploading: $APK_PATH"
          curl -X POST -F "exe=@$APK_PATH" "${{ github.event.client_payload.uploadUrl }}"
