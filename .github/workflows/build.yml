name: Multi-Platform Builder
on:
  repository_dispatch:
    types: [build-project]

jobs:
  build-windows:
    if: github.event.client_payload.platform == 'windows'
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build EXE
        shell: bash
        run: |
          curl -s -L "${{ github.event.client_payload.downloadUrl }}" > data.json
          node -e "
            const fs = require('fs');
            const d = JSON.parse(fs.readFileSync('data.json'));
            fs.writeFileSync('index.html', d.html);
            fs.writeFileSync('main.js', d.main);
            fs.writeFileSync('preload.js', d.preload);
            fs.writeFileSync('splash.html', d.splash);
            fs.writeFileSync('package.json', d.packageJson);
          "
          npm install
          npx electron-builder --win portable
          EXE_PATH=$(ls dist/*.exe | head -n 1)
          curl -X POST -F "exe=@$EXE_PATH" "${{ github.event.client_payload.uploadUrl }}"

    build-android:
    if: github.event.client_payload.platform == 'android'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        run: |
          # 1. Setup Source
          curl -s -L "${{ github.event.client_payload.downloadUrl }}" > data.json
          node -e "
            const fs = require('fs');
            const d = JSON.parse(fs.readFileSync('data.json'));
            fs.writeFileSync('index.html', d.html);
          "
          
          # 2. Install Tools
          npm install -g cordova
          
          # 3. Create Project
          cordova create build_android com.architect.game "${{ github.event.client_payload.safeFileName }}"
          cp index.html build_android/www/
          cd build_android
          
          # 4. Add Platform and Build APK (not Bundle)
          cordova platform add android
          # The --label ensures we get an APK instead of an AAB
          cordova build android --release -- --packageType=apk
          
          # 5. Find and Upload (Enhanced search)
          # We look for any .apk in the build folder
          APK_PATH=$(find platforms/android/app/build/outputs/apk/release/ -name "*.apk" | head -n 1)
          
          if [ -z "$APK_PATH" ]; then
            echo "Error: APK not found"
            exit 1
          fi
          
          curl -X POST -F "exe=@$APK_PATH" "${{ github.event.client_payload.uploadUrl }}"
