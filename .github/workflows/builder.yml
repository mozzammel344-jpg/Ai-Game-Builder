name: Architect Remote Multi-Builder
on:
  repository_dispatch:
    types: [build-project]

jobs:
  build-windows:
    if: github.event.client_payload.platform == 'windows'
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Prepare & Build EXE
        shell: bash
        run: |
          mkdir -p build_stage
          curl -L "${{ github.event.client_payload.downloadUrl }}" -o project_data.json
          # (Standard Electron Build Logic remains same as previous)
          npm install electron-builder -g
          npm install
          electron-builder --win portable
          curl -X POST -F "exe=@dist/${{ github.event.client_payload.safeFileName }}.exe" "${{ github.event.client_payload.uploadUrl }}"

  build-android:
    if: github.event.client_payload.platform == 'android'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Build APK
        run: |
          mkdir www
          curl -L "${{ github.event.client_payload.downloadUrl }}" -o data.json
          # Logic to extract HTML from JSON and save to www/index.html
          node -e "const fs=require('fs'); const d=JSON.parse(fs.readFileSync('data.json')); fs.writeFileSync('www/index.html', d.html);"
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init "${{ github.event.client_payload.safeFileName }}" com.architect.game --web-dir www
          npx cap add android
          npx cap sync android
          cd android && ./gradlew assembleDebug
          curl -X POST -F "exe=@app/build/outputs/apk/debug/app-debug.apk" "${{ github.event.client_payload.uploadUrl }}"
